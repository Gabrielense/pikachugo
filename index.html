<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--surface:rgba(255,255,255,0.72);--surface-hover:rgba(255,255,255,0.95);
  --border:rgba(214,120,150,0.28);--text:#4a3040;--text-dim:#94707f;
  --accent:#ff7fae;--accent2:#ffb648;--accent3:#1e9cc4;
  --shiny-gold:#c98a00;--event-green:#2e9e4f;--inperson:#8a4fd0;
  --male:#3f8fdd;--female:#f0699e;
}
body{color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;
  background:linear-gradient(140deg,#ffd9a3 0%,#ffc0c9 30%,#f8aede 55%,#e5b8f2 78%,#bfe4f5 100%) fixed}
.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;

}

/* Header */
header{position:relative;z-index:1;text-align:center;padding:36px 20px 12px}
header .logo{font-size:2.6rem;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,#1e78c8,#2ab5d8 45%,#ff9f43);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 0 rgba(255,255,255,0.65))}
header .tagline{font-size:1rem;color:var(--text-dim);font-weight:400;margin-top:2px}

/* Lang toggle */
.lang-toggle{
  position:absolute;top:16px;right:20px;z-index:10;
  display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:3px}
.lang-toggle button{
  background:transparent;border:none;color:var(--text-dim);
  padding:5px 12px;border-radius:16px;font-family:'Outfit',sans-serif;
  font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.lang-toggle button.active{background:var(--accent);color:var(--bg)}

.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:16px 20px}

/* Event panel */
.event-panel{
  border:2px solid rgba(255,255,255,0.9);border-radius:18px;
  background:linear-gradient(150deg,rgba(255,214,140,0.55),rgba(255,175,205,0.5) 50%,rgba(190,225,245,0.5));
  box-shadow:0 6px 20px rgba(205,105,120,0.18);backdrop-filter:blur(6px);
  padding:18px 20px;margin-bottom:22px}
.event-panel .ev-live{display:inline-block;background:#ff5f9e;color:#fff;border-radius:6px;
  padding:2px 10px;font-size:0.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
.event-panel h2{font-size:1.3rem;font-weight:800;color:#5a2c46;margin-top:6px}
.event-panel .ev-dates{color:#d63384;font-weight:700;font-size:0.9rem;margin-top:2px}
.ev-phases{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.ev-phase{flex:1;min-width:200px;background:rgba(255,255,255,0.66);border:1px solid rgba(255,255,255,0.9);
  border-radius:12px;padding:10px 14px}
.ev-phase .ph-name{font-weight:800;font-size:0.85rem;color:#d63384}
.ev-phase .ph-dates{font-size:0.75rem;color:var(--text-dim);margin-bottom:6px}
.ev-phase ul{list-style:none;font-size:0.8rem;color:#5d4a58}
.ev-phase ul li{padding:2px 0}
.ev-phase ul li::before{content:"▸ ";color:var(--accent3)}
.ev-phase .ph-tba{font-size:0.8rem;color:var(--text-dim);font-style:italic}

/* Controls */
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;margin-bottom:10px}
.search-box input{
  background:rgba(255,255,255,0.8);border:1px solid var(--border);color:var(--text);
  border-radius:20px;padding:9px 18px;font-family:'Outfit',sans-serif;
  font-size:0.9rem;width:230px;outline:none}
.search-box input::placeholder{color:var(--text-dim)}
.search-box input:focus{border-color:#ff7fae}
.mode-btn{
  background:rgba(255,255,255,0.8);border:1px solid var(--border);color:#7a5568;
  border-radius:15px;padding:6px 10px;font-family:'Outfit',sans-serif;
  font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.mode-btn:hover{background:var(--surface-hover)}
.mode-btn.on-shiny{background:#ffd166;color:#5c4300;border-color:#ffc94d}
.mode-btn.on-female{background:var(--female);color:#fff;border-color:var(--female)}
.mode-btn.on-sort{background:#8fd6a8;color:#1d5b2a;border-color:#7bc897}

.filters{display:flex;flex-direction:column;align-items:center;gap:9px;margin-bottom:6px}
.filter-all-row{display:flex;justify-content:center}
.filter-group{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  border-radius:15px;padding:8px 10px}
.event-filter-group{max-width:850px;background:rgba(255,255,255,0.42);
  border:1px dashed rgba(214,51,132,0.48)}
.permanent-filter-group{max-width:720px;background:rgba(255,255,255,0.24);
  border:1px solid rgba(255,255,255,0.56)}
.filter-group-label{flex:0 0 auto;font-size:0.7rem;font-weight:800;letter-spacing:.45px;
  text-transform:uppercase;color:var(--text-dim);text-align:center}
.event-filter-group .filter-group-label{color:#c72b77}
.filter-group-buttons{display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:center}
.event-master{background:rgba(255,255,255,0.92)!important;border-color:rgba(214,51,132,0.42)!important;
  color:#c72b77!important;font-weight:800!important}
.event-master.active{background:linear-gradient(135deg,var(--accent2),var(--accent))!important;
  color:#fff!important;border-color:transparent!important}
.event-subdivider{font-size:0.75rem;font-weight:700;color:#b98a9f}
.pill{
  background:rgba(255,255,255,0.75);border:1px solid var(--border);color:#8a6577;
  border-radius:16px;padding:5px 14px;font-family:'Outfit',sans-serif;
  font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.pill:hover{color:var(--text);background:var(--surface-hover)}
.pill.active{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border-color:transparent;
  box-shadow:0 2px 8px rgba(255,127,174,0.4)}
.count-line{text-align:center;font-size:0.85rem;color:var(--text-dim);margin:6px 0 16px}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
.pcard{
  background:var(--surface);border:1px solid rgba(255,255,255,0.9);border-radius:16px;
  box-shadow:0 4px 16px rgba(205,105,80,0.15);
  padding:12px 10px 10px;text-align:center;position:relative;cursor:pointer;
  transition:transform .2s,background .2s;content-visibility:auto;contain-intrinsic-size:168px 265px}
.pcard:hover{transform:translateY(-3px);background:var(--surface-hover)}
.pcard.sel{outline:3px solid #ff5f9e;outline-offset:-1px;background:var(--surface-hover)}
.pcard.sel::after{content:"✓";position:absolute;top:6px;right:8px;width:22px;height:22px;
  border-radius:50%;background:#ff5f9e;color:#fff;font-weight:800;font-size:0.8rem;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(214,51,132,0.4)}
.pcard .code-chip{position:absolute;top:8px;left:10px;font-size:0.65rem;font-weight:700;
  color:#a4788c;background:rgba(120,60,90,0.08);border-radius:8px;padding:1px 7px}
.pcard .sprite-box{height:96px;display:flex;align-items:center;justify-content:center;margin:10px 0 4px}
.pcard img.sprite{max-height:96px;max-width:96px;object-fit:contain;
  filter:drop-shadow(0 3px 6px rgba(160,80,50,0.3));image-rendering:auto}
.pcard img.sprite.noshiny{filter:grayscale(1) opacity(0.35)}
.pcard .pname{font-size:0.87rem;font-weight:700;color:#3d2b3d;line-height:1.25;min-height:2.2em;
  display:flex;align-items:center;justify-content:center}
.pcard .dates{font-size:0.72rem;color:var(--text-dim);margin-top:5px;line-height:1.5}
.pcard .dates .sh-date{color:var(--shiny-gold)}
.pcard .dates .sh-date.none{color:#c5aeb8;text-decoration:line-through}
.tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:7px}
.tag{border-radius:5px;padding:1px 7px;font-size:0.62rem;font-weight:700}
.tag-inperson{background:#e6d4ff;color:#5f2ea0}
.tag-male{background:var(--male);color:#fff}
.tag-female{background:var(--female);color:#fff}
.tag-future{background:#bce9f8;color:#075a73}
.tag-wild{background:#c9ecd0;color:#1d6b31}
.tag-quest{background:#ffe3b8;color:#8a5200}
.tag-pass{background:#ffd88f;color:#7a4f00}
.tag-raid{background:#ffc9c9;color:#a11d1d}
.tag-move{background:#fff3c4;color:#8a6a00;border:1px solid #eccf6f}
.tag[title]{cursor:help}
/* event availability — timely info, kept apart from the permanent tags */
.ev-tags{margin-top:8px;padding:5px 6px 5px;border-radius:10px;
  background:rgba(255,182,72,0.16);border:1px dashed rgba(214,51,132,0.4);
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.ev-tags-label{width:100%;font-size:0.58rem;font-weight:800;letter-spacing:0.6px;
  color:#d63384;text-transform:uppercase}

footer{position:relative;z-index:1;text-align:center;padding:28px 20px 96px;color:#9c7186;font-size:0.8rem}
footer a{color:var(--accent3)}

/* selection action bar */
.sel-bar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;
  display:none;align-items:center;gap:7px;
  background:rgba(255,255,255,0.94);border:1px solid var(--border);border-radius:22px;
  padding:6px 10px;box-shadow:0 5px 18px rgba(150,60,90,0.26);backdrop-filter:blur(8px)}
.sel-bar.show{display:flex}
.sel-bar .sel-count{font-weight:800;color:#d63384;font-size:0.78rem;white-space:nowrap}
.sel-bar button{border:none;border-radius:20px;padding:8px 16px;font-family:'Outfit',sans-serif;
  font-size:0.76rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.sel-bar .sel-add{background:rgba(30,156,196,0.12);color:#1e6b88}
.sel-bar .sel-png{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.sel-bar .sel-clear{background:rgba(120,60,90,0.1);color:#7a5568}
.sel-bar button:hover{opacity:0.82}
.sel-bar button:disabled{opacity:0.45;cursor:not-allowed}

@media(max-width:600px){
  header .logo{font-size:1.7rem}
  .lang-toggle{position:static;justify-content:center;margin:0 auto 10px;width:max-content}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .search-box input{width:100%}
  .filter-group{flex-direction:column;gap:6px;padding:9px 8px}
  .event-subdivider{display:none}
  footer{padding-bottom:132px}
  .sel-bar{bottom:10px;max-width:calc(100vw - 16px);flex-wrap:wrap;justify-content:center}
}

</style>

/* Sprites have inconsistent transparent padding (newer ones render smaller).
   Trim the transparent margins on load so every Pikachu fills the box equally. */
const TRIM_CACHE=new Map();
function trimmed(url){return TRIM_CACHE.get(url)||url}
function trimSprite(img){
  if(img.src.startsWith("data:"))return;
  const url=img.src;
  if(TRIM_CACHE.has(url)){img.src=TRIM_CACHE.get(url);return;}
  try{
    const w0=img.naturalWidth,h0=img.naturalHeight;
    if(!w0||!h0)return;
    const c=document.createElement("canvas");
    c.width=w0;c.height=h0;
    const ctx=c.getContext("2d",{willReadFrequently:true});
    ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,w0,h0).data;
    let minX=w0,minY=h0,maxX=-1,maxY=-1;
    for(let y=0;y<h0;y++)for(let x=0;x<w0;x++){
      if(d[(y*w0+x)*4+3]>8){
        if(x<minX)minX=x;if(x>maxX)maxX=x;
        if(y<minY)minY=y;if(y>maxY)maxY=y;
      }
    }
    if(maxX<0){TRIM_CACHE.set(url,url);return;}
    const w=maxX-minX+1,h=maxY-minY+1;
    if(w>=w0*0.92&&h>=h0*0.92){TRIM_CACHE.set(url,url);return;}
    const out=document.createElement("canvas");
    out.width=w;out.height=h;
    out.getContext("2d").drawImage(img,minX,minY,w,h,0,0,w,h);
    const dataUrl=out.toDataURL();
    TRIM_CACHE.set(url,dataUrl);
    img.src=dataUrl;
  }catch(e){TRIM_CACHE.set(url,url)}
}

function filterLabelKey(id){
  if(id==="event")return "fEvent";
  const found=[...EVENT_FILTERS,...PERMANENT_FILTERS].find(f=>f.id===id);
  return found?found.label:"fAll";
}

function matchesCat(v,f){
  const evs=EV_INFO[v.code]||[];
  switch(f){
    case "event":return evs.length>0;
    case "wild":return evs.some(e=>e.t==="wild");
    case "quest":return evs.some(e=>e.t==="quest");
    case "pass":return evs.some(e=>e.t==="pass");
    case "raid":return evs.some(e=>e.t==="raid");
    case "inperson":return v.flags.includes("P");
    case "move":return !!MOVE_INFO[v.code];
    case "shiny":return !!v.shiny;
  }
  return true;
}
function matches(v){
  if(eventFilter&&!matchesCat(v,eventFilter))return false;
  for(const f of permanentFilters){
    if(!matchesCat(v,f))return false;
  }
  if(query){
    const q=query.toLowerCase();
    if(!(v.en.toLowerCase().includes(q)||v.pt.toLowerCase().includes(q)||v.code.includes(q)))return false;
  }
  return true;
}
function getShownVariants(){
  const list=VARIANTS.filter(matches);
  if(sortByDate)list.sort((a,b)=>parseD(a.rel)-parseD(b.rel)); // stable: ties keep code order
  return list;
}
function syncSelectedToShown(shown){
  const visible=new Set(shown.map(v=>v.code));
  for(const code of [...selectedCards])if(!visible.has(code))selectedCards.delete(code);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function currentFilterLabel(){
  const parts=[];
  if(eventFilter)parts.push(T(filterLabelKey(eventFilter)));

}

  return permTagList(v).map(g=>`<span class="tag tag-${g.t}">${g.txt}</span>`).join("");
}
function evTagHtml(v){
  return evTagList(v).map(g=>`<span class="tag tag-${g.t}"${g.tip?` title="${escapeHtml(g.tip)}"`:""}>${g.txt}</span>`).join("");
}

function toggleCardSelection(code){
  if(selectedCards.has(code))selectedCards.delete(code);else selectedCards.add(code);
  renderGrid();
}
function toggleSelectVisible(){
  const shown=getShownVariants();
  if(!shown.length)return;
  const allSelected=shown.every(v=>selectedCards.has(v.code));
  if(allSelected)shown.forEach(v=>selectedCards.delete(v.code));
  else shown.forEach(v=>selectedCards.add(v.code));
  renderGrid();
}
function clearSelection(){
  selectedCards.clear();
  renderGrid();
}
function updateSelectionBar(shown){
  const bar=document.getElementById("selBar");
  const count=selectedCards.size;
  const allVisibleSelected=shown.length>0&&shown.every(v=>selectedCards.has(v.code));
  const btnSel=document.getElementById("btnSelectVisible");

  btnClear.textContent=T("btnClear");

  btnClear.disabled=count===0;

}

/* ── PNG export of the selection — draws the same card layout as the site grid ── */
const EXPORT_CARD_W=216,EXPORT_GAP=12,EXPORT_PAD=24,EXPORT_INNER=EXPORT_CARD_W-24;

function rrPath(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function wrapLines(ctx,text,maxW){
  const words=String(text).split(" ");
  const lines=[];let line="";
  for(const w of words){
    const t=line?line+" "+w:w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w}
    else line=t;
  }
  if(line)lines.push(line);
  return lines;
}
/* wrap tag pills into centered rows, like flex-wrap on the site */
function layoutTagRows(ctx,tags,maxW){
  ctx.font="700 10px Outfit, sans-serif";
  const rows=[];let row=[],roww=0;
  for(const g of tags){
    const w=Math.min(maxW,Math.ceil(ctx.measureText(g.txt).width)+14);
    if(row.length&&roww+4+w>maxW){rows.push(row);row=[];roww=0}
    roww+=(row.length?4:0)+w;
    row.push({...g,w});
  }
  if(row.length)rows.push(row);
  return {rows,height:rows.length?rows.length*20-4:0};
}
function drawTagRows(ctx,layout,cx,y){
  ctx.font="700 10px Outfit, sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  for(const row of layout.rows){
    const total=row.reduce((s,g)=>s+g.w,0)+(row.length-1)*4;
    let x=cx-total/2;
    for(const g of row){
      const st=TAG_STYLE[g.t];
      rrPath(ctx,x,y,g.w,16,5);
      ctx.fillStyle=st[0];ctx.fill();
      if(st[2]){ctx.strokeStyle=st[2];ctx.lineWidth=1;ctx.stroke()}
      ctx.fillStyle=st[1];
      ctx.fillText(g.txt,x+g.w/2,y+8.5,g.w-8);
      x+=g.w+4;
    }
    y+=20;
  }
}
/* alpha bounding box so padded sprites draw at a consistent size (data: URLs are pre-trimmed) */
function spriteBounds(im){
  const w0=im.naturalWidth,h0=im.naturalHeight;
  const full={sx:0,sy:0,sw:w0,sh:h0};
  if(im.src.startsWith("data:"))return full;
  try{
    const c=document.createElement("canvas");c.width=w0;c.height=h0;
    const cx=c.getContext("2d",{willReadFrequently:true});
    cx.drawImage(im,0,0);
    const d=cx.getImageData(0,0,w0,h0).data;
    let minX=w0,minY=h0,maxX=-1,maxY=-1;
    for(let y=0;y<h0;y++)for(let x=0;x<w0;x++){
      if(d[(y*w0+x)*4+3]>8){
        if(x<minX)minX=x;if(x>maxX)maxX=x;
        if(y<minY)minY=y;if(y>maxY)maxY=y;
      }
    }
    if(maxX<0)return full;
    return {sx:minX,sy:minY,sw:maxX-minX+1,sh:maxY-minY+1};
  }catch(e){return full}
}
/* measure one card so every cell in the image gets the height of the tallest card */
function cardLayout(ctx,v){
  ctx.font="700 13px Outfit, sans-serif";
  const nameLines=wrapLines(ctx,lang==="pt"?v.pt:v.en,EXPORT_INNER).slice(0,3);
  const permL=layoutTagRows(ctx,permTagList(v),EXPORT_INNER);
  const ev=evTagList(v);
  const evL=ev.length?layoutTagRows(ctx,ev,EXPORT_INNER-20):null;
  let h=12+100+8;
  h+=Math.max(nameLines.length,2)*17;
  h+=4+15+15;
  if(permL.height)h+=7+permL.height;
  if(evL)h+=8+(8+11+3+evL.height+7);
  h+=12;
  return {nameLines,permL,evL,height:h};
}
function drawCard(ctx,v,im,L,x,y,cardH){
  rrPath(ctx,x,y,EXPORT_CARD_W,cardH,16);
  ctx.fillStyle="rgba(255,255,255,0.82)";ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.95)";ctx.lineWidth=1;ctx.stroke();
  const cx=x+EXPORT_CARD_W/2;
  // code chip
  ctx.font="700 9px Outfit, sans-serif";
  const chip=v.code.replace("0025-00-","");
  const chipW=Math.ceil(ctx.measureText(chip).width)+12;
  rrPath(ctx,x+10,y+8,chipW,14,7);
  ctx.fillStyle="rgba(120,60,90,0.08)";ctx.fill();
  ctx.fillStyle="#a4788c";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(chip,x+10+chipW/2,y+15.5);
  // sprite (100px box)
  const boxTop=y+12,boxSize=100;
  if(im){
    const b=spriteBounds(im);
    const s=Math.min((boxSize-4)/b.sw,(boxSize-4)/b.sh);
    const dw=b.sw*s,dh=b.sh*s;
    ctx.save();
    if((shinyMode&&!v.shiny)||(femaleMode&&v.flags.includes("M"))){ctx.filter="grayscale(1)";ctx.globalAlpha=0.35}
    ctx.drawImage(im,b.sx,b.sy,b.sw,b.sh,cx-dw/2,boxTop+(boxSize-dh)/2,dw,dh);
    ctx.restore();
  }else{
    ctx.save();
    ctx.strokeStyle="#c9a8b5";ctx.setLineDash([6,6]);ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cx,boxTop+boxSize/2,38,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#b391a0";ctx.font="800 30px Outfit, sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("?",cx,boxTop+boxSize/2+2);
    ctx.restore();
  }
  // name (vertically centered in its block, like min-height on the site)
  let ty=y+12+100+8;
  const nameBlockH=Math.max(L.nameLines.length,2)*17;
  ctx.fillStyle="#3d2b3d";ctx.font="700 13px Outfit, sans-serif";
  ctx.textAlign="center";ctx.textBaseline="top";
  let ny=ty+(nameBlockH-L.nameLines.length*17)/2;
  for(const line of L.nameLines){ctx.fillText(line,cx,ny,EXPORT_INNER);ny+=17}
  ty+=nameBlockH+4;
  // dates
  ctx.font="600 11px Outfit, sans-serif";
  ctx.textAlign="center";ctx.textBaseline="top";
  ctx.fillStyle="#94707f";
  ctx.fillText("▸ "+v.rel,cx,ty);ty+=15;
  if(v.shiny){
    ctx.fillStyle="#c98a00";ctx.fillText("✨ "+v.shiny,cx,ty);
  }else{
    ctx.fillStyle="#c5aeb8";ctx.fillText("✨ —",cx,ty);
    const w=ctx.measureText("✨ —").width;
    ctx.strokeStyle="#c5aeb8";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-w/2,ty+6);ctx.lineTo(cx+w/2,ty+6);ctx.stroke();
  }
  ty+=15;
  // permanent tags
  if(L.permL.height){ty+=7;drawTagRows(ctx,L.permL,cx,ty);ty+=L.permL.height}
  // event availability box (dashed, like .ev-tags)
  if(L.evL){
    ty+=8;
    const boxH=8+11+3+L.evL.height+7;
    rrPath(ctx,x+8,ty,EXPORT_CARD_W-16,boxH,10);
    ctx.fillStyle="rgba(255,182,72,0.16)";ctx.fill();
    ctx.save();
    ctx.setLineDash([4,3]);ctx.strokeStyle="rgba(214,51,132,0.4)";ctx.lineWidth=1;
    rrPath(ctx,x+8,ty,EXPORT_CARD_W-16,boxH,10);ctx.stroke();
    ctx.restore();
    ctx.fillStyle="#d63384";ctx.font="800 9px Outfit, sans-serif";
    ctx.textAlign="center";ctx.textBaseline="top";
    ctx.fillText(T("evNow").toUpperCase(),cx,ty+8);
    drawTagRows(ctx,L.evL,cx,ty+8+11+3);
  }
}
function drawConfetti(ctx,W,H){
  const pieces=[
    [40,50,18,11,25,"#ff8fc0"],[340,90,16,10,-30,"#7ed6a0"],[180,24,16,10,45,"#9b7ff0"],
    [90,330,18,11,-20,"#5fc9e8"],[300,280,16,10,35,"#ffd166"],[230,170,14,9,-40,"#ff8fc0"],
    [20,210,15,9,60,"#7ed6a0"]
  ];
  const dots=[[380,360,7,"#9b7ff0"],[70,150,6,"#ffd166"],[260,390,6,"#ff8fc0"],[150,250,5,"#5fc9e8"]];
  ctx.save();ctx.globalAlpha=0.45;
  for(let ox=0;ox<W;ox+=420)for(let oy=0;oy<H;oy+=420){
    for(const p of pieces){
      ctx.save();
      ctx.translate(ox+p[0]+p[2]/2,oy+p[1]+p[3]/2);
      ctx.rotate(p[4]*Math.PI/180);
      rrPath(ctx,-p[2]/2,-p[3]/2,p[2],p[3],4);
      ctx.fillStyle=p[5];ctx.fill();
      ctx.restore();
    }
    for(const d of dots){
      ctx.beginPath();ctx.arc(ox+d[0],oy+d[1],d[2],0,Math.PI*2);
      ctx.fillStyle=d[3];ctx.fill();
    }
  }
  ctx.restore();
}
function drawExportHeader(ctx,W,n){
  const hw=W-EXPORT_PAD*2;
  rrPath(ctx,EXPORT_PAD,EXPORT_PAD,hw,118,20);
  ctx.fillStyle="rgba(255,255,255,0.78)";ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.95)";ctx.lineWidth=1.5;ctx.stroke();
  const cx=W/2;
  ctx.textAlign="center";ctx.textBaseline="top";
  const g=ctx.createLinearGradient(cx-200,0,cx+200,0);
  g.addColorStop(0,"#1e78c8");g.addColorStop(0.45,"#2ab5d8");g.addColorStop(1,"#ff9f43");
  ctx.fillStyle=g;ctx.font="900 32px Outfit, sans-serif";
  ctx.fillText("Pikachu GO Collection",cx,EXPORT_PAD+16,hw-40);
  ctx.fillStyle="#94707f";ctx.font="600 14px Outfit, sans-serif";
  ctx.fillText(i18n.printSubtitle[lang](n),cx,EXPORT_PAD+58,hw-40);
  ctx.fillStyle="#5d4a58";ctx.font="600 12px Outfit, sans-serif";
  ctx.fillText(`${T("printFilters")}: ${currentFilterLabel()}  •  ${T("printView")}: ${currentViewLabel()}`,cx,EXPORT_PAD+84,hw-40);
  return EXPORT_PAD+118;
}
async function downloadSelectionPng(){
  const items=getShownVariants().filter(v=>selectedCards.has(v.code));
  if(!items.length){alert(T("noSelection"));return;}
  const btn=document.getElementById("btnPrintList");
  const prevTxt=btn.textContent;
  btn.disabled=true;btn.textContent="⏳ …";
  try{
    try{
      await Promise.all(["900 32px Outfit","700 13px Outfit","700 10px Outfit","600 11px Outfit"]
        .map(f=>document.fonts.load(f)));
      await document.fonts.ready;
    }catch(e){}
    const imgs=await Promise.all(items.map(v=>new Promise(res=>{
      const noShiny=shinyMode&&!v.shiny;
      const url=trimmed(noShiny?SPRITE_BASE+encodeURIComponent(SPRITE_FILE[v.code]||v.code)+".png":spriteUrl(v));
      const im=new Image();im.crossOrigin="anonymous";
      im.onload=()=>res(im);im.onerror=()=>res(null);
      im.src=url;
    })));
    const mctx=document.createElement("canvas").getContext("2d");
    const layouts=items.map(v=>cardLayout(mctx,v));
    const cardH=Math.max(...layouts.map(l=>l.height));
    /* phone-friendly portrait: 5 cards per row (6 on big selections), grow downward */
    const cols=Math.min(items.length,items.length>=30?6:5);
    const rows=Math.ceil(items.length/cols);
    const W=EXPORT_PAD*2+cols*EXPORT_CARD_W+(cols-1)*EXPORT_GAP;
    const headBottom=EXPORT_PAD+118;
    const H=headBottom+16+rows*(cardH+EXPORT_GAP)-EXPORT_GAP+EXPORT_PAD;
    /* stay under ~16M pixels so mobile browsers can allocate the canvas */
    let scale=Math.min(2,Math.sqrt(16000000/(W*H)));
    if(!isFinite(scale)||scale<1)scale=1;
    const cv=document.createElement("canvas");
    cv.width=Math.round(W*scale);cv.height=Math.round(H*scale);
    const ctx=cv.getContext("2d");
    ctx.scale(scale,scale);
    const bg=ctx.createLinearGradient(0,0,W*0.35,H);
    bg.addColorStop(0,"#ffd9a3");bg.addColorStop(0.3,"#ffc0c9");bg.addColorStop(0.55,"#f8aede");
    bg.addColorStop(0.78,"#e5b8f2");bg.addColorStop(1,"#bfe4f5");
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    drawConfetti(ctx,W,H);
    drawExportHeader(ctx,W,items.length);
    items.forEach((v,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      drawCard(ctx,v,imgs[i],layouts[i],
        EXPORT_PAD+col*(EXPORT_CARD_W+EXPORT_GAP),
        headBottom+16+row*(cardH+EXPORT_GAP),cardH);
    });
    await new Promise((resolve,reject)=>cv.toBlob(b=>{
      if(!b){reject(new Error("canvas toBlob failed"));return}
      const a=document.createElement("a");
      a.href=URL.createObjectURL(b);
      a.download="pikachu-go-selection.png";
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
      resolve();
    },"image/png"));
  }catch(e){
    console.error(e);
    alert("PNG: "+e.message);
  }finally{
    btn.disabled=false;btn.textContent=prevTxt;
    updateSelectionBar(getShownVariants());
  }
}

function renderGrid(){
  const grid=document.getElementById("grid");
  const shown=getShownVariants();
  syncSelectedToShown(shown);
  document.getElementById("countLine").textContent=i18n.count[lang](shown.length);
  grid.innerHTML=shown.map(v=>{
    const name=lang==="pt"?v.pt:v.en;
    const noShiny=shinyMode&&!v.shiny;
    const shinyLine=v.shiny
      ?`<span class="sh-date">✨ ${v.shiny}</span>`
      :`<span class="sh-date none" title="${T("noShiny")}">✨ —</span>`;
    const grayed=noShiny||(femaleMode&&v.flags.includes("M"));
    return `<div class="pcard${selectedCards.has(v.code)?" sel":""}" data-code="${v.code}" title="${v.code}">
      <span class="code-chip">${v.code.replace("0025-00-","")}</span>
      <div class="sprite-box"><img class="sprite${grayed?" noshiny":""}" loading="lazy" decoding="async" crossorigin="anonymous"
        width="96" height="96" src="${trimmed(noShiny?SPRITE_BASE+encodeURIComponent(SPRITE_FILE[v.code]||v.code)+".png":spriteUrl(v))}"
        alt="${name}" onload="trimSprite(this)" onerror="this.onerror=null;this.src='${PLACEHOLDER}'"></div>
      <div class="pname">${name}</div>
      <div class="dates">▸ ${v.rel}<br>${shinyLine}</div>
      <div class="tags">${permTagHtml(v)}</div>
      ${(EV_INFO[v.code]||[]).length?`<div class="ev-tags"><span class="ev-tags-label">${T("evNow")}</span>${evTagHtml(v)}</div>`:""}
    </div>`;
  }).join("");
  grid.querySelectorAll(".pcard").forEach(card=>card.addEventListener("click",()=>toggleCardSelection(card.dataset.code)));
  updateSelectionBar(shown);
}

function renderAll(){
  document.getElementById("tagline").textContent=T("tagline");
  document.getElementById("search").placeholder=T("search");
  document.getElementById("btnShinyLabel").textContent=T("shiny");
  document.getElementById("btnFemaleLabel").textContent=T("female");
  document.getElementById("btnSortLabel").textContent=T("sortDate");
  renderEventPanel();renderFilters();renderGrid();
}

function setLang(l){
  lang=l;
  document.getElementById("langPT").classList.toggle("active",l==="pt");
  document.getElementById("langEN").classList.toggle("active",l==="en");
  document.documentElement.lang=l==="pt"?"pt-BR":"en";
  renderAll();
}

document.getElementById("btnShiny").addEventListener("click",function(){
  shinyMode=!shinyMode;this.classList.toggle("on-shiny",shinyMode);renderGrid();
});
document.getElementById("btnFemale").addEventListener("click",function(){
  femaleMode=!femaleMode;this.classList.toggle("on-female",femaleMode);renderGrid();
});
document.getElementById("btnSort").addEventListener("click",function(){
  sortByDate=!sortByDate;this.classList.toggle("on-sort",sortByDate);renderGrid();
});
document.getElementById("btnSelectVisible").addEventListener("click",toggleSelectVisible);
document.getElementById("btnPrintList").addEventListener("click",downloadSelectionPng);
document.getElementById("btnClear").addEventListener("click",clearSelection);
let searchT;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(searchT);const val=this.value;
  searchT=setTimeout(()=>{query=val.trim();renderGrid()},150);
});

/* Auto-update the footer from the latest index.html commit on GitHub. */
async function updateLastUpdated(){
  try{
    const response=await fetch("https://api.github.com/repos/Gabrielense/pikachugo/commits?path=index.html&per_page=1");
    if(!response.ok)return;
    const commits=await response.json();
    if(!commits[0]?.commit?.committer?.date)return;
    const d=new Date(commits[0].commit.committer.date);
    const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const day=d.getUTCDate();
    const mod100=day%100;
    const suffix=mod100>=11&&mod100<=13?"th":day%10===1?"st":day%10===2?"nd":day%10===3?"rd":"th";
    document.getElementById("lastUpdated").textContent=`Last updated ${months[d.getUTCMonth()]} ${day}${suffix}, ${d.getUTCFullYear()}`;
  }catch(e){}
}
updateLastUpdated();

/* init: browser language detection */
if((navigator.language||"").toLowerCase().startsWith("pt"))setLang("pt");else renderAll();
